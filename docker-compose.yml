services:
  postgres-db:
    image: postgres:16-alpine
    container_name: bradesco-credito-db
    environment:
      POSTGRES_USER: admin_credito
      POSTGRES_PASSWORD: SenhaForteBradesco123
      POSTGRES_DB: db_credito_imobiliario
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - credito-network

  api-app:
    build: .
    container_name: bradesco-credito-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/db_credito_imobiliario
    depends_on:
      - postgres-db
    networks:
      - credito-network

volumes:
  postgres_data:

networks:
  credito-network:
